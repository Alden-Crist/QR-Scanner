<div class="qr-section">
  <div class="section-actions">
    <button class="reset-btn" type="button" (click)="clearScan()">
      <i class="fa-solid fa-rotate-left"></i>
      Reset
    </button>
  </div>
</div>
<div class="row g-3">
  <!-- LEFT -->
  <div class="col-md-7">
    <!-- SCANNER MODE -->
    <div class="scanner-panel" *ngIf="!isSearchMode">
      <div class="panel-header-row">
        <h3 class="panel-title mb-0">Scanner</h3>
      </div>
      <!-- READY TO SCAN -->
      <div class="scanner-box" *ngIf="!scannedQrItemId">
        <!-- Placeholder -->
        <div class="scanner-placeholder" *ngIf="!isScannerRunning">
          <div class="scanner-placeholder-icon">
            <i class="fa-solid fa-qrcode"></i>
          </div>
        </div>

        <!-- Camera -->
        <div
          id="qr-reader"
          class="qr-reader-box"
          [style.display]="isScannerRunning ? 'block' : 'none'"
        ></div>

        <p class="scanner-instruction">
          {{
            isScannerRunning
              ? "Point the camera at the QR code and keep it inside the frame."
              : "Click the button below to start scanning."
          }}
        </p>

        <button
          *ngIf="!isScannerRunning"
          class="btn-scan"
          (click)="startScanning()"
        >
          <i class="fa fa-camera"></i>
          Start Scanning
        </button>

        <button
          *ngIf="isScannerRunning"
          class="btn btn-outline-secondary"
          (click)="stopScanning()"
        >
          <i class="fa fa-stop"></i>
          Stop Scanning
        </button>
      </div>
      <!-- SUCCESS -->
      <div class="scanner-box success-box" *ngIf="scannedQrItemId">
        <div class="success-icon">
          <i class="fa fa-check"></i>
        </div>
        <h4>Scan Successful!</h4>
        <p class="success-message">
          QR code scanned successfully. Ticket details are shown on the right.
        </p>
        <div class="success-item-card">
          <div class="success-item-icon">
            <i class="fa fa-id-card"></i>
          </div>
          <div class="success-item-details">
            <span class="success-item-label">Scanned Item ID</span>
            <span class="success-item-value">{{ scannedQrItemId }}</span>
          </div>
        </div>
      </div>
    </div>
    <!-- SEARCH MODE -->
  </div>
  <div class="col-md-5">
    <div class="validation-panel"></div>
  </div>
  <!-- RIGHT -->
</div>
